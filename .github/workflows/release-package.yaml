name: Release Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v1.0.2"
        required: true
        type: string
      release_name:
        description: "Release name. Leave empty to use the tag."
        required: false
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: false
        type: boolean
      draft:
        description: "Create as draft"
        required: true
        default: false
        type: boolean
      run_checks:
        description: "Run typecheck and test before release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-package-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    name: Release from upstream main only
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: >
      github.repository == 'JSZipp/JSZipp' &&
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Refuse unsafe context
        shell: bash
        run: |
          set -euo pipefail

          echo "Repository: $GITHUB_REPOSITORY"
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Ref: $GITHUB_REF"

          if [ "$GITHUB_REPOSITORY" != "JSZipp/JSZipp" ]; then
            echo "::error::This release workflow may only run in JSZipp/JSZipp."
            exit 1
          fi

          if [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]; then
            echo "::error::This release workflow may only be run manually or by another workflow dispatch."
            exit 1
          fi

          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::This release workflow may only run from main."
            exit 1
          fi

      - name: Validate release inputs
        id: release
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ inputs.tag }}"
          RELEASE_NAME="${{ inputs.release_name }}"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::tag must be semver with a leading v, e.g. v1.0.2 or v1.1.0-beta.1"
            exit 1
          fi

          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="$TAG"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

      - name: Check whether GitHub release already exists
        id: github_release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${{ steps.release.outputs.tag }}" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "GitHub release ${{ steps.release.outputs.tag }} already exists. Nothing to create."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether tag already exists
        if: steps.github_release.outputs.exists == 'false'
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags

          if git rev-parse "${{ steps.release.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.release.outputs.tag }} already exists; the release will be created from the existing tag."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.github_release.outputs.exists == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Upgrade npm for trusted publishing
        if: steps.github_release.outputs.exists == 'false'
        run: npm install -g npm@latest

      - name: Enable pnpm
        if: steps.github_release.outputs.exists == 'false'
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Install dependencies
        if: steps.github_release.outputs.exists == 'false'
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        if: steps.github_release.outputs.exists == 'false' && inputs.run_checks
        run: pnpm run typecheck

      - name: Build
        if: steps.github_release.outputs.exists == 'false'
        run: pnpm run build

      - name: Test
        if: steps.github_release.outputs.exists == 'false' && inputs.run_checks
        run: pnpm run test

      - name: Package release assets
        if: steps.github_release.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.release.outputs.tag }}"
          ASSET_DIR="release-assets"

          if [ ! -d dist ]; then
            echo "::error::dist directory was not found. Did pnpm run build create it?"
            exit 1
          fi

          mkdir -p "$ASSET_DIR"

          for FILE in jszipp.mjs jszipp.umd.js jszipp.cjs; do
            if [ ! -f "dist/$FILE" ]; then
              echo "::error::dist/$FILE was not found."
              echo "Files in dist:"
              find dist -maxdepth 2 -type f | sort
              exit 1
            fi

            case "$FILE" in
              jszipp.mjs)
                cp "dist/$FILE" "$ASSET_DIR/jszipp-${TAG}.mjs"
                ;;
              jszipp.umd.js)
                cp "dist/$FILE" "$ASSET_DIR/jszipp-${TAG}.umd.js"
                ;;
              jszipp.cjs)
                cp "dist/$FILE" "$ASSET_DIR/jszipp-${TAG}.cjs"
                ;;
            esac
          done

          zip -r "$ASSET_DIR/jszipp-${TAG}-dist.zip" dist

          echo "Release assets:"
          find "$ASSET_DIR" -maxdepth 1 -type f -print | sort

      - name: Create and push tag
        if: steps.github_release.outputs.exists == 'false' && steps.tag.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${{ steps.release.outputs.tag }}" -m "${{ steps.release.outputs.tag }}"
          git push origin "${{ steps.release.outputs.tag }}"

      - name: Create GitHub release
        if: steps.github_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          generate_release_notes: true
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            release-assets/jszipp-${{ steps.release.outputs.tag }}.mjs
            release-assets/jszipp-${{ steps.release.outputs.tag }}.umd.js
            release-assets/jszipp-${{ steps.release.outputs.tag }}.cjs
            release-assets/jszipp-${{ steps.release.outputs.tag }}-dist.zip
